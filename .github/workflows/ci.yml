name: CI

on:
  push:
    branches: [main, mobile-prep]
  pull_request:
    branches: [main, mobile-prep]
  # Allow other workflows (e.g. release) to require this one.
  workflow_call:

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: packages/core/coverage/
          if-no-files-found: error

  # Prove the desktop app still packages end-to-end (sync-core → bundle-deps →
  # electron-builder) on a PR, catching packaging breakage before a tagged
  # release. macOS-only by decision; Windows is validated at tag time by
  # release.yml. No `--publish` and no artifact upload — this only verifies the
  # build runs, keeping it fast and binary-free.
  build-macos:
    name: Build (macOS, no publish)
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app (no publish)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac -- --publish never
