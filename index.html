<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Apply the saved theme before any rendering to avoid a flash of wrong theme. -->
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      // 'auto' or unset: leave no attribute so prefers-color-scheme applies.
    })();
  </script>
  <title>Semester Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Auto-update banner (hidden until electron-updater fires an event) -->
  <div id="update-banner" class="update-banner hidden" role="status">
    <span id="update-banner-text" class="update-banner-text"></span>
    <button id="update-restart-btn" class="btn btn-small hidden">Restart to update</button>
    <button id="update-dismiss-btn" class="update-dismiss" aria-label="Dismiss"></button>
  </div>

  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="logo">Semester Planner</h1>
        <span id="save-status" class="save-status" aria-live="polite"></span>
      </div>
      <div class="header-controls">
        <button id="theme-toggle" class="btn btn-icon-text" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon"></span>
          <span class="theme-label"></span>
        </button>
        <div class="selector-group">
          <select id="semester-select" class="semester-select" aria-label="Select semester"></select>
          <button id="edit-semester-btn" class="icon-btn" title="Edit semester" aria-label="Edit semester"></button>
          <button id="delete-semester-btn" class="icon-btn" title="Delete semester" aria-label="Delete semester"></button>
        </div>
        <div class="view-toggle" role="group" aria-label="Layout view">
          <button type="button" id="view-week" class="view-btn" data-view="week">Week view</button>
          <button type="button" id="view-course" class="view-btn" data-view="course">Course view</button>
        </div>
        <button id="new-semester-btn" class="btn btn-primary btn-icon-text">
          <svg class="ti" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14" /><path d="M5 12l14 0" /></svg>
          New Semester
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings"></button>
      </div>
    </div>
  </header>

  <main class="main">
    <section id="dashboard" class="dashboard"></section>
    <section id="planner" class="planner"></section>
  </main>

  <!-- New semester modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Create New Semester</h2>
      <form id="new-semester-form">
        <label>
          Semester name
          <input type="text" id="ns-name" placeholder="Winter Semester 2025" required />
        </label>
        <label>
          Start date
          <input type="date" id="ns-start" required />
        </label>
        <label>
          Number of weeks
          <input type="number" id="ns-weeks" min="1" max="30" value="15" required />
        </label>

        <div class="ns-courses-header">
          <span>Courses</span>
          <button type="button" id="ns-add-course" class="btn btn-small btn-icon-text">
            <svg class="ti" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14" /><path d="M5 12l14 0" /></svg>
            Add course
          </button>
        </div>
        <div id="ns-courses" class="ns-courses"></div>

        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn">Cancel</button>
          <button type="submit" id="modal-submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" class="icon-btn" aria-label="Close settings"></button>
      </div>

      <div class="settings-row">
        <span class="settings-label">Autosave</span>
        <label class="switch">
          <input type="checkbox" id="set-autosave" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <span class="settings-label">Auto-update</span>
        <label class="switch">
          <input type="checkbox" id="set-autoupdate" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <span class="settings-label">Version</span>
        <span class="settings-value" id="set-version">—</span>
      </div>
    </div>
  </div>

  <script src="lib/planner-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
