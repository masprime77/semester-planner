name: Release

# Build and publish the macOS and Windows apps for version tags.
on:
  push:
    tags: ['v*']

jobs:
  # Run the full CI workflow first. If any test fails, this job fails and the
  # build below never runs — so a release is never built when tests fail.
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & publish macOS app
    needs: ci
    runs-on: macos-latest
    # Allow electron-builder to create/upload the GitHub Release via GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      # Import the persistent self-signed code-signing certificate (if the repo
      # secrets are set) into a temporary keychain, then expose the identity to
      # afterPack via MAC_SIGN_IDENTITY. This gives every release a STABLE
      # signing identity, which is what lets Squirrel.Mac auto-update between
      # builds. Without the secret this step is skipped and the build falls back
      # to ad-hoc signing. See docs/MACOS_SIGNING.md.
      - name: Import self-signed signing certificate
        env:
          MAC_CSC_P12_BASE64: ${{ secrets.MAC_CSC_P12_BASE64 }}
          MAC_CSC_PASSWORD: ${{ secrets.MAC_CSC_PASSWORD }}
        if: ${{ env.MAC_CSC_P12_BASE64 != '' }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD="$(openssl rand -base64 18)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$MAC_CSC_P12_BASE64" | base64 --decode > /tmp/lectio-cert.p12
          security import /tmp/lectio-cert.p12 -k "$KEYCHAIN" -P "$MAC_CSC_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          rm -f /tmp/lectio-cert.p12
          # Put our keychain at the front of the search list (keeping the
          # existing ones) so codesign in afterPack can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed -e 's/[" ]//g' | tr '\n' ' ')
          security default-keychain -s "$KEYCHAIN"
          # The cert is self-signed (untrusted), so `find-identity -v` (valid +
          # trusted only) hides it. List without -v and pull the 40-char SHA-1;
          # codesign signs fine with an untrusted identity we own the key for.
          IDENTITY="$(security find-identity -p codesigning "$KEYCHAIN" | grep -oE '[0-9A-F]{40}' | head -1)"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No code-signing identity found in the imported keychain"; exit 1
          fi
          echo "MAC_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Imported self-signed code-signing identity: $IDENTITY"

      - name: Build & publish (.dmg + .zip + latest-mac.yml)
        env:
          # GitHub token so electron-builder can publish release assets,
          # including the latest-mac.yml metadata electron-updater reads.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Don't let electron-builder hunt for an Apple identity; afterPack
          # signs the bundle itself (with MAC_SIGN_IDENTITY when set, else ad-hoc).
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac --workspace @lectio/desktop -- --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/latest-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build & publish Windows app
    # Same gate as macOS (waits for tests) but independent of the macOS `build`
    # job, so one OS failing does not block the other's release assets.
    needs: ci
    runs-on: windows-latest
    # Allow electron-builder to create/upload the GitHub Release via GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build & publish (.exe + .zip + latest.yml)
        env:
          # GitHub token so electron-builder can publish release assets,
          # including the latest.yml metadata electron-updater reads on Windows.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build in CI, mirroring macOS.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win --workspace @lectio/desktop -- --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-app
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.zip
            packages/desktop/dist/latest.yml
          if-no-files-found: error
